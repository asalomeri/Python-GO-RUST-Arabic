version: 2

updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-all:
        patterns:
          - "*"

  # ── Python (pip) – requirements.txt في جذر المستودع ───────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      pip-root-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  # ── Python (pip) – web_scraper/requirements.txt ────────────────────────────
  - package-ecosystem: "pip"
    directory: "/python/projects/web_scraper"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      pip-web-scraper-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

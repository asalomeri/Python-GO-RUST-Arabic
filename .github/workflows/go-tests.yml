name: اختبارات Go

on:
  push:
    branches: [ main, master ]
    paths:
      - 'go/**'
      - 'go.mod'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: إعداد Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: بناء ملفات Go
        run: |
          go build ./go/...

      - name: فحص ملفات Go
        run: |
          go vet ./go/...

      - name: التحقق من التنسيق
        run: |
          if [ "$(gofmt -l ./go)" != "" ]; then
            echo "الملفات التالية تحتاج إلى تنسيق:"
            gofmt -l ./go
          fi

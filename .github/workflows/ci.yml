steps:
  - uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: ${{ matrix.python-version }}

  - name: Restore pip cache
    uses: actions/cache@v4
    with:
      path: ~/.cache/pip
      key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

  - name: Detect environment.yml
    id: conda
    run: |
      if [ -f environment.yml ]; then
        echo "conda=true" >> $GITHUB_OUTPUT
      else
        echo "conda=false" >> $GITHUB_OUTPUT
      fi

  - name: Install dependencies (conda)
    if: steps.conda.outputs.conda == 'true'
    run: |
      sudo apt-get update && sudo apt-get install -y wget bzip2 ca-certificates libglib2.0-0 libxext6 libsm6 libxrender1 git
      wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O miniconda.sh
      bash miniconda.sh -b -p $HOME/miniconda
      echo "export PATH=$HOME/miniconda/bin:$PATH" >> $GITHUB_ENV
      source $HOME/miniconda/bin/activate
      conda env create -f environment.yml || conda env update -f environment.yml || true
      conda activate python-go-rust-arabic || true
      pip install -r requirements.txt || true

  - name: Install dependencies (pip fallback)
    if: steps.conda.outputs.conda == 'false'
    run: |
      python -m pip install --upgrade pip
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  - name: Install dev tools
    run: |
      python -m pip install --upgrade pip
      pip install black flake8 pytest pylint

  - name: Run linters
    run: |
      black --check . || true
      flake8 . || true

  - name: Run tests
    run: |
      pytest --maxfail=1 -q

name: فحص جودة الكود

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  python-lint:
    name: فحص Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: إعداد Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: تثبيت أدوات الفحص
        run: |
          pip install pylint black flake8

      - name: فحص بـ flake8
        run: |
          flake8 python/ --max-line-length=127 --extend-ignore=E501,W503 || true

      - name: فحص بـ black
        run: |
          black --check python/ || true

  go-lint:
    name: فحص Go
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: إعداد Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: فحص بـ go vet
        run: |
          go vet ./go/... || true

  rust-lint:
    name: فحص Rust
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: إعداد Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: فحص بـ clippy
        run: |
          cargo clippy || true

      - name: فحص التنسيق
        run: |
          cargo fmt --all -- --check || true

name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint black flake8
    
    - name: Security check - bandit
      run: |
        pip install bandit
        bandit -r python/ -f json -o bandit-report.json || true
    
    # Compute the correct commit range for TruffleHog.
    # TruffleHog requires base != head to have a diff to scan.
    # - On push: use github.event.before (previous SHA) → github.sha (current SHA).
    #   If before is all-zeros (initial commit / force-push with no history), skip the scan.
    # - On pull_request: use the PR base SHA → PR head SHA for an exact diff of the PR changes.
    - name: Determine TruffleHog scan range
      id: scan-range
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
        else
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "base=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Check for secrets
      if: steps.scan-range.outputs.skip != 'true'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ steps.scan-range.outputs.base }}
        head: ${{ steps.scan-range.outputs.head }}
        extra_args: --debug
    
    - name: Code complexity check
      run: |
        pip install radon
        radon cc python/ -a -s
    
    - name: Lint summary
      run: |
        echo "=== Python Linting Summary ==="
        python -m pylint python/ --exit-zero | tail -20
